name: Compile Native Android Application

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Rebuild Android Environment
        run: |
          # 1. Backup your C Engine and CMake config
          mkdir -p /tmp/native_backup/cpp
          cp -r android/app/src/main/cpp /tmp/native_backup/cpp || true
          cp android/app/CMakeLists.txt /tmp/native_backup/CMakeLists.txt || true
          
          # 2. Delete the corrupted, manually-made android folder
          rm -rf android
          
          # 3. Ask Flutter to generate a flawless, modern Android wrapper
          flutter create --platforms android .
          
          # 4. Restore your C Engine files to the new folder
          mkdir -p android/app/src/main/cpp
          cp -r /tmp/native_backup/cpp/* android/app/src/main/cpp/ 2>/dev/null || true
          cp /tmp/native_backup/CMakeLists.txt android/app/CMakeLists.txt 2>/dev/null || true
          
          # 5. Tell the new build.gradle.kts to compile your C++ code (Kotlin Syntax)
          cat << 'EOF' >> android/app/build.gradle.kts
          
          android {
              externalNativeBuild {
                  cmake {
                      path = file("CMakeLists.txt")
                  }
              }
          }
          EOF
          
          # 6. Inject Storage Permissions into the new AndroidManifest
          sed -i '/<application/i \    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml

      - name: Install Dependencies
        run: flutter pub get

      - name: Compile Native C and Dart
        run: flutter build apk --release

      - name: Extract Binaries
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
